<form [formGroup]="loginForm" (ngSubmit)="onLogin()" 
style="margin: 20px;  ">

  <mat-card>

    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <!-- Email -->
      <mat-form-field appearance="fill" style="width: 100%;">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
      </mat-form-field>

      <!-- Password -->
      <mat-form-field appearance="fill" style="width: 100%;">
        <mat-label>Password</mat-label>
        <input matInput [type]="hide ? 'password' : 'text'" formControlName="password">

        <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
          <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" type="submit" style="width: 100%;">
        Login
      </button>
    </mat-card-actions>

    <mat-card-actions>
        <h4>If You have not Account</h4>
        <a mat-stroked-button  routerLink="/register" style="margin-left: 20px; background-color: brown; color: white;">Register</a>
      </mat-card-actions>

      <br>
      <mat-card-actions>
        <h4>Forgot Password</h4>
        <a mat-stroked-button 
         routerLink="/reset-password" style="margin-left: 20px;
          background-color: brown; color: white;">forgot Password</a>
      </mat-card-actions>

  </mat-card>

</form>
