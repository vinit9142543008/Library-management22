<h2>📦 Borrowed Books</h2>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Book ID</th>
    <th>Due Date</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let b of borrows">
    <td>{{ b.id }}</td>
    <td>{{ b.bookId }}</td>
    <td>{{ b.dueDate }}</td>
    <td>
      <button (click)="returnBook(b.id)">
        Return
      </button>
    </td>
  </tr>
</table>
